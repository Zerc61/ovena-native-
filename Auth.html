<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Daftar — Pâtisserie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

    <!-- Background -->
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>

    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <h1>Ove<span>na</span></h1>
            <p>Bakery Premium</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="daftar">Daftar</button>
                <div class="tab-indicator" id="tabIndicator"></div>
            </div>

            <!-- Panels -->
            <div class="auth-panels">

                <!-- ====== LOGIN ====== -->
                <div class="auth-panel active" id="panel-login">
                    <form id="form-login" novalidate>
                        <div class="field">
                            <label>E-mail</label>
                            <input type="email" id="l-email" placeholder="contoh@email.com" autocomplete="email">
                            <div class="error-msg" id="l-email-err">Masukkan e-mail yang valid</div>
                        </div>
                        <div class="field">
                            <label>Kata Sandi</label>
                            <div class="pw-wrap">
                                <input type="password" id="l-pass" placeholder="Masukkan kata sandi" autocomplete="current-password">
                                <button type="button" class="pw-btn" onclick="togglePw('l-pass', this)">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="error-msg" id="l-pass-err">Kata sandi tidak boleh kosong</div>
                        </div>
                        <div class="forgot">
                            <a href="#" onclick="event.preventDefault(); toast('Fitur reset kata sandi segera hadir', 'info')">Lupa kata sandi?</a>
                        </div>
                        <button type="submit" class="btn-submit"><span>Login</span></button>
                    </form>

                   

                   
                </div>

                <!-- ====== DAFTAR ====== -->
                <div class="auth-panel" id="panel-daftar">
                    <form id="form-daftar" novalidate>
                        <div class="field">
                            <label>Nama Lengkap</label>
                            <input type="text" id="d-nama" placeholder="Nama lengkap kamu" autocomplete="name">
                            <div class="error-msg" id="d-nama-err">Nama wajib diisi</div>
                        </div>
                        <div class="field">
                            <label>E-mail</label>
                            <input type="email" id="d-email" placeholder="contoh@email.com" autocomplete="email">
                            <div class="error-msg" id="d-email-err">Masukkan e-mail yang valid</div>
                        </div>
                        <div class="field">
                            <label>Kata Sandi</label>
                            <div class="pw-wrap">
                                <input type="password" id="d-pass" placeholder="Minimal 6 karakter" autocomplete="new-password">
                                <button type="button" class="pw-btn" onclick="togglePw('d-pass', this)">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="error-msg" id="d-pass-err">Kata sandi minimal 6 karakter</div>
                        </div>
                        <label class="checkbox" id="d-agree-wrap">
                            <input type="checkbox" id="d-agree">
                            <div class="check-box">
                                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                            <span>Saya menyetujui <a href="#" onclick="event.preventDefault(); event.stopPropagation(); toast('Halaman syarat & ketentuan sedang disiapkan', 'info')">Syarat & Ketentuan</a></span>
                        </label>
                        <div class="error-msg" id="d-agree-err" style="margin-top:-14px; margin-bottom:18px;">Anda harus menyetujui syarat & ketentuan</div>
                        <button type="submit" class="btn-submit"><span>Daftar</span></button>
                    </form>

                  
                </div>

            </div>
        </div>

        <!-- Back -->
        <div class="back-link">
            <a href="/index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Kembali ke beranda
            </a>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastBox"></div>

    <script src="assets/js/auth.js">
       
    </script>

</body>
</html>
